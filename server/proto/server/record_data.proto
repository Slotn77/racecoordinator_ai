syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "RecordDataProto";

message RecordEntry {
  double value = 1;
  string holder_name = 2;
  int64 date = 3;
  string holder_nickname = 4;
  string holder_team_name = 5;
}

message RecordData {
  OverallRecords overall = 1;
  CurrentRecords current = 2;
}

message OverallRecords {
  RecordEntry fastest_lap = 1;
  RecordEntry highest_score = 2;
  repeated RecordEntry lane_fastest_lap = 3;
  repeated RecordEntry lane_highest_score = 4;
}

message CurrentRecords {
  RecordEntry fastest_lap = 1;
  RecordEntry highest_score = 2;
  RecordEntry heat_fastest_lap = 3;
  repeated RecordEntry lane_fastest_lap = 4;
  repeated RecordEntry lane_highest_score = 5;
}
