<div class="graphs-container">
  <h2 class="graphs-section-title">{{ titleKey | translate: titleParams }}</h2>
  <svg
    [attr.width]="width"
    [attr.height]="height"
    [attr.viewBox]="'0 0 ' + width + ' ' + height"
    class="results-svg-graphs"
  >
    <!-- Background rect (subtle glassmorphic panel overlay) -->
    <rect width="100%" height="100%" fill="none" />

    <!-- LEFT GRAPH: RANKINGS -->
    <g class="rankings-graph">
      <!-- Grid Ticks X -->
      @for (tick of xTicks; track $index) {
        <g>
          <line
            [attr.x1]="scaleXLeft(tick)"
            [attr.y1]="padding.top"
            [attr.x2]="scaleXLeft(tick)"
            [attr.y2]="height - padding.bottom"
            class="grid-line"
          />
          <text
            [attr.x]="scaleXLeft(tick)"
            [attr.y]="height - padding.bottom + 25"
            class="tick-text"
            text-anchor="middle"
          >
            {{ tick | number: "1.0-0" }}
          </text>
        </g>
      }
      <!-- Grid Ticks Y (Rankings) -->
      @for (tick of yTicksLeft; track $index) {
        <g>
          <line
            [attr.x1]="scaleXLeft(0)"
            [attr.y1]="scaleYLeft(tick)"
            [attr.x2]="scaleXLeft(maxX)"
            [attr.y2]="scaleYLeft(tick)"
            class="grid-line"
          />
          <text
            [attr.x]="scaleXLeft(0) - 15"
            [attr.y]="scaleYLeft(tick) + 5"
            class="tick-text-rank"
            text-anchor="end"
          >
            #{{ tick }}
          </text>
        </g>
      }
      <!-- Solid Axis Lines -->
      <line
        [attr.x1]="scaleXLeft(0)"
        [attr.y1]="height - padding.bottom"
        [attr.x2]="scaleXLeft(maxX)"
        [attr.y2]="height - padding.bottom"
        class="axis-line"
      />
      <line
        [attr.x1]="scaleXLeft(0)"
        [attr.y1]="padding.top"
        [attr.x2]="scaleXLeft(0)"
        [attr.y2]="height - padding.bottom"
        class="axis-line"
      />
      <!-- Titles -->
      <text
        [attr.x]="scaleXLeft(maxX / 2)"
        [attr.y]="height - padding.bottom + 55"
        class="axis-title"
        text-anchor="middle"
      >
        {{ leftXAxisKey | translate }}
      </text>
      <text
        [attr.x]="scaleXLeft(0) - 80"
        [attr.y]="height / 2"
        class="axis-title"
        text-anchor="middle"
        [attr.transform]="
          'rotate(-90, ' + (scaleXLeft(0) - 80) + ', ' + height / 2 + ')'
        "
      >
        {{ leftYAxisKey | translate }}
      </text>
      <!-- Header -->
      <text
        [attr.x]="scaleXLeft(maxX / 2)"
        [attr.y]="padding.top - 20"
        class="graph-header-text"
        text-anchor="middle"
      >
        {{ leftTitleKey | translate }}
      </text>
      @for (line of driverLines; track trackByDriverLine($index, line)) {
        @if (
          isDriverVisible(line.objectId) || hoveredDriverId === line.objectId
        ) {
          <g
            class="driver-group"
            [class.graph-highlight]="hoveredDriverId === line.objectId"
            [class.graph-faded]="
              hoveredDriverId !== null && hoveredDriverId !== line.objectId
            "
            [style.--line-color]="line.color"
          >
            <path
              [attr.d]="line.rankPathData"
              [attr.stroke]="line.color"
              class="graph-path-rank"
            />
            @for (p of line.rankPoints; track $index) {
              @if (p.isOwnLap && p.causesStandingsChange !== false) {
                <g>
                  <circle
                    [attr.cx]="scaleXLeft(p.x)"
                    [attr.cy]="scaleYLeft(p.y)"
                    r="5"
                    [attr.fill]="line.backgroundColor"
                    [attr.stroke]="line.color"
                    class="graph-point-circle"
                  />
                </g>
              }
            }
          </g>
        }
      }
    </g>

    <!-- RIGHT GRAPH: LAP TIMES -->
    <g class="laptimes-graph">
      <!-- Grid Ticks X -->
      @for (tick of xTicks; track $index) {
        <g>
          <line
            [attr.x1]="scaleXRight(tick)"
            [attr.y1]="padding.top"
            [attr.x2]="scaleXRight(tick)"
            [attr.y2]="height - padding.bottom"
            class="grid-line"
          />
          <text
            [attr.x]="scaleXRight(tick)"
            [attr.y]="height - padding.bottom + 25"
            class="tick-text"
            text-anchor="middle"
          >
            {{ tick | number: "1.0-0" }}
          </text>
        </g>
      }
      <!-- Grid Ticks Y (Lap Times) -->
      @for (tick of yTicks; track $index) {
        <g>
          <line
            [attr.x1]="scaleXRight(0)"
            [attr.y1]="scaleY(tick)"
            [attr.x2]="scaleXRight(maxX)"
            [attr.y2]="scaleY(tick)"
            class="grid-line"
          />
          <text
            [attr.x]="scaleXRight(0) - 15"
            [attr.y]="scaleY(tick) + 5"
            class="tick-text"
            text-anchor="end"
          >
            {{ tick | number: "1.2-2" }}
          </text>
        </g>
      }
      <!-- Solid Axis Lines -->
      <line
        [attr.x1]="scaleXRight(0)"
        [attr.y1]="height - padding.bottom"
        [attr.x2]="scaleXRight(maxX)"
        [attr.y2]="height - padding.bottom"
        class="axis-line"
      />
      <line
        [attr.x1]="scaleXRight(0)"
        [attr.y1]="padding.top"
        [attr.x2]="scaleXRight(0)"
        [attr.y2]="height - padding.bottom"
        class="axis-line"
      />
      <!-- Titles -->
      <text
        [attr.x]="scaleXRight(maxX / 2)"
        [attr.y]="height - padding.bottom + 55"
        class="axis-title"
        text-anchor="middle"
      >
        {{ rightXAxisKey | translate }}
      </text>
      <text
        [attr.x]="scaleXRight(0) - 80"
        [attr.y]="height / 2"
        class="axis-title"
        text-anchor="middle"
        [attr.transform]="
          'rotate(-90, ' + (scaleXRight(0) - 80) + ', ' + height / 2 + ')'
        "
      >
        {{ rightYAxisKey | translate }}
      </text>
      <!-- Header -->
      <text
        [attr.x]="scaleXRight(maxX / 2)"
        [attr.y]="padding.top - 20"
        class="graph-header-text"
        text-anchor="middle"
      >
        {{ rightTitleKey | translate }}
      </text>
      @for (line of driverLines; track trackByDriverLine($index, line)) {
        @if (
          isDriverVisible(line.objectId) || hoveredDriverId === line.objectId
        ) {
          <g
            class="driver-group"
            [class.graph-highlight]="hoveredDriverId === line.objectId"
            [class.graph-faded]="
              hoveredDriverId !== null && hoveredDriverId !== line.objectId
            "
            [style.--line-color]="line.color"
          >
            <path
              [attr.d]="line.pathData"
              [attr.stroke]="line.color"
              class="graph-path-lap"
            />
            @for (p of line.points; track $index) {
              <g>
                <circle
                  [attr.cx]="scaleXRight(p.x)"
                  [attr.cy]="scaleY(p.y)"
                  r="5"
                  [attr.fill]="line.backgroundColor"
                  [attr.stroke]="line.color"
                  class="graph-point-circle"
                />
              </g>
            }
          </g>
        }
      }
    </g>

    <!-- Legend -->
    <g class="legend">
      @for (line of driverLines; track trackByDriverLine($index, line)) {
        <g
          class="legend-item"
          [class.legend-item-hidden]="!isDriverVisible(line.objectId)"
          [attr.transform]="
            'translate(' + line.legendX + ', ' + line.legendY + ')'
          "
          (click)="onLegendClick(line.objectId)"
          (dblclick)="onLegendDblClick(line.objectId)"
          (mouseenter)="hoveredDriverId = line.objectId"
          (mouseleave)="hoveredDriverId = null"
          [style.--hover-color]="line.color"
        >
          <!-- Invisible background rect for larger click target -->
          <rect
            width="170"
            height="24"
            y="-3"
            fill="transparent"
            class="legend-click-target"
          />
          <rect
            width="18"
            height="18"
            [attr.fill]="
              isDriverVisible(line.objectId)
                ? line.backgroundColor
                : 'rgba(30, 41, 59, 0.2)'
            "
            [attr.stroke]="
              isDriverVisible(line.objectId) ? line.color : '#475569'
            "
            stroke-width="2"
            rx="4"
            class="legend-rect"
          />
          <text
            x="25"
            y="14"
            class="legend-text"
            [class.legend-text-hidden]="!isDriverVisible(line.objectId)"
          >
            {{ line.driverName }}
          </text>
        </g>
      }
    </g>
  </svg>
</div>
